# Cartesian limits for the Pilz planner (Denso).
# NOTE: max_trans_vel must match motion_server's `pilz_max_trans_vel` parameter,
# which is used to convert an absolute requested TCP speed (m/s) into a velocity
# scaling factor for Pilz LIN.
cartesian_limits:
  max_trans_vel: 1.0
  max_trans_acc: 2.25
  max_trans_dec: -5.0
  max_rot_vel: 1.57
