#   minimal_displacement_weight: 0.001
#   orientation_threshold: 0.01
#   minimal_displacement_weight: 0.005
#   gd_step_size: 0.0001

arm:
  kinematics_solver: pick_ik/PickIkPlugin
  kinematics_solver_search_resolution: 0.005   # Finer search resolution along the path
  kinematics_solver_timeout: 0.5               # 500ms per IK call — very generous
  kinematics_solver_attempts: 10               # Retry hard before giving up

  # --- LOCAL mode for Cartesian interpolation ---
  # computeCartesianPath calls IK sequentially for each waypoint,
  # passing the previous solution as the seed → local GD is correct here.
  # Global/evolutionary would waste time re-exploring when you already have a great seed.
  mode: local

  # --- Accuracy ---
  position_threshold: 0.0005          # 0.5mm — tight, ensures path fidelity
  orientation_threshold: 0.005        # Very tight orientation tracking
  cost_threshold: 0.001

  # --- Scales ---
  position_scale: 1.0
  rotation_scale: 0.5                 # Full 6-DOF tracking along the path

  # --- Joint smoothness ---
  # Small but non-zero: penalizes large jumps between consecutive waypoints
  # This is what keeps the Cartesian path smooth and physically sane
  minimal_displacement_weight: 0.001

  # --- Gradient descent tuning ---
  # Smaller step = more precise convergence, worth it since we have timeout budget
  gd_step_size: 0.0001

  # --- Approximate solution guard ---
  # If a waypoint IK drifts too far from goal, reject it rather than accept garbage
  approximate_solution_position_threshold: 0.001
  approximate_solution_orientation_threshold: 0.01
